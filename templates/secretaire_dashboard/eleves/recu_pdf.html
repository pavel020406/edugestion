{% extends 'secretaire_dashboard/base_secretaire.html' %}

{% block titre %}Inscrire un élève{% endblock %}

{% block content %}
<h3 class="mb-4">Inscrire un élève et son parent</h3>

<form method="post">
    {% csrf_token %}

    <div class="card p-4 mb-4">
        <h6 class="text-primary mb-3">Informations de l'élève</h6>
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Nom *</label>
                <input type="text" name="nom" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Prénom *</label>
                <input type="text" name="prenom" class="form-control" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Date de naissance *</label>
                <input type="date" name="date_naissance" class="form-control" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Sexe *</label>
                <select name="sexe" class="form-select" required>
                    <option value="">—</option>
                    <option value="M">Masculin</option>
                    <option value="F">Féminin</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Classe</label>
                <select name="classe" class="form-select">
                    <option value="">— Non assigné —</option>
                    {% for c in classes %}
                        <option value="{{ c.id }}">{{ c }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>

    <div class="card p-4 mb-4">
        <h6 class="text-primary mb-3">Informations du parent / tuteur</h6>
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Nom complet du parent *</label>
                <input type="text" name="nom_parent" class="form-control" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Téléphone *</label>
                <input type="text" name="telephone_parent" class="form-control" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">E-mail (pour les messages)</label>
                <input type="email" name="email_parent" class="form-control">
            </div>
        </div>
    </div>

    <div class="card p-4 mb-4">
        <h6 class="text-primary mb-3">Compte de connexion de l'élève (optionnel)</h6>
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Identifiant</label>
                <input type="text" name="username" class="form-control" placeholder="Généré automatiquement si vide">
            </div>
            <div class="col-md-6">
                <label class="form-label">Mot de passe</label>
                <input type="text" name="password" class="form-control" placeholder="Matricule utilisé par défaut si vide">
            </div>
        </div>
    </div>

    <button type="submit" class="btn btn-primary btn-lg">Inscrire l'élève</button>
    <a href="{% url 'dashboard_secretaire' %}" class="btn btn-outline-secondary btn-lg">Annuler</a>
</form>
{% endblock %}
